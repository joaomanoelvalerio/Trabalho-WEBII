<div class="register-container">
  <h1>Crie sua Conta</h1>
  <form (ngSubmit)="onSubmit()" #regForm="ngForm">
    <div class="form-section">
      <h4>Dados Pessoais</h4>
      <div class="form-field">
        <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" [(ngModel)]="usuario.nome" required />
      </div>
      <div class="form-field">
        <label for="email">E-mail:</label>
        <input type="email" name="email" [(ngModel)]="usuario.email" required email />
      </div>
      <div class="form-field">
        <label for="cpf">CPF:</label>
        <input type="text" name="cpf" [(ngModel)]="usuario.cpf" required />
      </div>
      <div class="form-field">
        <label for="telefone">Telefone:</label>
        <input type="tel" name="telefone" [(ngModel)]="usuario.telefone" required />
      </div>
    </div>

    <div class="form-section">
      <h4>Endereço</h4>
      <div class="form-field">
        <label for="cep">CEP:</label>
        <input type="text" name="cep" [(ngModel)]="usuario.endereco.cep" (blur)="onCepBlur()" required />
      </div>
      <div class="form-field">
        <label for="logradouro">Rua/Logradouro:</label>
        <input type="text" name="logradouro" [(ngModel)]="usuario.endereco.logradouro" required [disabled]="isAddressLoading" />
      </div>
      <div class="form-field">
        <label for="numero">Número:</label>
        <input type="text" name="numero" [(ngModel)]="usuario.endereco.numero" required />
      </div>
      <div class="form-field">
        <label for="complemento">Complemento:</label>
        <input type="text" name="complemento" [(ngModel)]="usuario.endereco.complemento" />
      </div>
      <div class="form-field">
        <label for="bairro">Bairro:</label>
        <input type="text" name="bairro" [(ngModel)]="usuario.endereco.bairro" required [disabled]="isAddressLoading" />
      </div>
      <div class="form-field">
        <label for="localidade">Cidade:</label>
        <input type="text" name="localidade" [(ngModel)]="usuario.endereco.cidade" required [disabled]="isAddressLoading" />
      </div>
      <div class="form-field">
        <label for="uf">Estado:</label>
        <input type="text" name="uf" [(ngModel)]="usuario.endereco.estado" required [disabled]="isAddressLoading" />
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div class="Botoes">
      <button type="submit" id="Botao" [disabled]="regForm.invalid || isAddressLoading">
        Cadastrar
      </button>
      <button (click)="navigateToLogin()" type="button" id="BotaoSecundario">
        Já possui uma conta?
      </button>
    </div>
  </form>
</div>
