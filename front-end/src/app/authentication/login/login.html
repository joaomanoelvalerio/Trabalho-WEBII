<div class="login-container">
    <h1>Login</h1>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div id="texto">
            <div class='camposCadastro'>
                <label for="inputEmail">Email:</label>
                <input 
                    type="email" 
                    name="email" 
                    [(ngModel)]="usuario.email" 
                    id="inputEmail" 
                    required>

                <label for="inputSenha">Senha:</label>
                <input 
                    type="password" 
                    name="senha" 
                    [(ngModel)]="usuario.senha" 
                    id="inputSenha" 
                    required>
            </div>
        </div>
        
        <div class="Botoes">
            <button type="submit" id="Botao">Entrar</button>
            <button type="button" id="BotaoSecundario" routerLink="/register">
                Cadastrar
            </button>
        </div>
    </form>
</div>
