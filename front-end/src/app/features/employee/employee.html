<div class="container mt-4">
  <div class="row mb-4 align-items-center">
    <div class="col">
      <h2 class="fw-bold text-primary">Solicitações Abertas</h2>
      <p class="text-muted">Aguardando orçamento técnico.</p>
    </div>
    <div class="col-auto">
      <span class="badge bg-danger bg-opacity-10 text-danger border border-danger rounded-pill px-3 py-2">
        {{ requests.length }} pendentes
      </span>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">Data</th>
            <th>Cliente ID</th>
            <th>Equipamento</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let req of requests">
            <td class="ps-4">{{ req.openedAt | date:'dd/MM HH:mm' }}</td>
            <td>#{{ req.clientId }}</td>
            <td>{{ getShortDescription(req.equipmentDescription) }}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-dark" (click)="onSubmitQuote(req)">Efetuar Orçamento</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
