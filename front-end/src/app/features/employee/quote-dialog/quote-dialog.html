<div class="p-4">
  
  <div class="mb-3">
    <h4 class="fw-bold text-primary m-0">Efetuar Orçamento</h4>
  </div>

  <div class="p-3 mb-4 bg-light rounded border-start border-4 border-primary shadow-sm">
    <div class="row mb-2">
      <div class="col-sm-4 text-muted fw-bold">Cliente</div>
      <div class="col-sm-8 text-break">{{ data.request.clientName }}</div>
    </div>
    <div class="row mb-2">
      <div class="col-sm-4 text-muted fw-bold">Equipamento</div>
      <div class="col-sm-8 text-break">{{ data.request.equipmentDescription }}</div>
    </div>
    <div class="row mb-2">
      <div class="col-sm-4 text-muted fw-bold">Defeito</div>
      <div class="col-sm-8 text-break">{{ data.request.defectDescription }}</div>
    </div>
    <div class="row">
      <div class="col-sm-4 text-muted fw-bold">Abertura</div>
      <div class="col-sm-8">{{ data.request.openedAt | date:'dd/MM/yyyy HH:mm' }}</div>
    </div>
  </div>

  <div class="mb-4">
    <label for="quoteValue" class="form-label fw-semibold text-secondary">Valor do Orçamento</label>
    <div class="input-group shadow-sm">
      <span class="input-group-text bg-white text-muted fw-bold">R$</span>
      <input type="text"
             id="quoteValue"
             class="form-control"
             placeholder="0,00"
             [value]="displayValue"
             (input)="onValueChange($event)">
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-light border shadow-sm px-4" (click)="onCancel()">
      Cancelar
    </button>
    <button type="button" class="btn btn-primary shadow-sm px-4" [disabled]="!quoteValue || quoteValue <= 0" (click)="onConfirm()">
      Confirmar Orçamento
    </button>
  </div>

</div>
