<div class="p-4">

  <div class="mb-3 d-flex align-items-center gap-2">
    <i class="bi bi-receipt-cutoff text-primary fs-4"></i>
    <h5 class="fw-bold text-primary mb-0">Efetuar Orçamento</h5>
  </div>

  <div class="p-3 mb-4 bg-light rounded border-start border-4 border-primary">
    <div class="row mb-2">
      <div class="col-4 text-muted fw-bold small">Cliente</div>
      <div class="col-8">{{ data.request.clientName || 'Cliente #' + data.request.clientId }}</div>
    </div>
    <div class="row mb-2">
      <div class="col-4 text-muted fw-bold small">Equipamento</div>
      <div class="col-8">{{ data.request.equipmentDescription }}</div>
    </div>
    <div class="row mb-2">
      <div class="col-4 text-muted fw-bold small">Defeito</div>
      <div class="col-8">{{ data.request.defectDescription }}</div>
    </div>
    <div class="row">
      <div class="col-4 text-muted fw-bold small">Abertura</div>
      <div class="col-8">{{ data.request.openedAt | date:'dd/MM/yyyy HH:mm' }}</div>
    </div>
  </div>

  <div class="mb-4">
    <label class="form-label fw-bold">
      Valor do Orçamento <span class="text-danger">*</span>
    </label>
    <div class="input-group">
      <span class="input-group-text bg-white fw-bold text-muted">R$</span>
      <input type="text"
             class="form-control"
             placeholder="0,00"
             [value]="displayValue"
             (input)="onValueChange($event)" />
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-outline-secondary px-4" (click)="onCancel()">
      Cancelar
    </button>
    <button type="button"
            class="btn btn-primary px-4"
            [disabled]="quoteValue <= 0"
            (click)="onConfirm()">
      <i class="bi bi-check-lg me-1"></i> Confirmar Orçamento
    </button>
  </div>

</div>
