<div class="container mt-4 pb-5">

  <div class="row mb-3">
    <div class="col">
      <h2 class="fw-bold text-primary">Nova Solicitação</h2>
      <p class="text-muted mb-0">Preencha as informações do equipamento e descreva o defeito.</p>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form #requestForm="ngForm" (ngSubmit)="onSubmit()">

        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label fw-bold">
              Categoria <span class="text-danger">*</span>
            </label>
            <select class="form-select"
                    name="category"
                    [(ngModel)]="newRequest.category"
                    required>
              <option [ngValue]="null" disabled>Selecione...</option>
              <option *ngFor="let cat of categories" [ngValue]="cat">{{ cat.name }}</option>
            </select>
          </div>

          <div class="col-md-8">
            <label class="form-label fw-bold">
              Descrição do Equipamento <span class="text-danger">*</span>
            </label>
            <input type="text"
                   class="form-control"
                   name="equipmentDescription"
                   [(ngModel)]="newRequest.equipmentDescription"
                   placeholder="Ex: Notebook Dell Inspiron 15"
                   required
                   #equipDesc="ngModel" />
            <div *ngIf="equipDesc.touched && countWords(newRequest.equipmentDescription) < 3"
                 class="text-danger small mt-1">
              Descreva com pelo menos 3 palavras.
            </div>
          </div>

          <div class="col-12">
            <label class="form-label fw-bold">
              Descrição do Defeito <span class="text-danger">*</span>
            </label>
            <textarea class="form-control"
                      name="defectDescription"
                      [(ngModel)]="newRequest.defectDescription"
                      rows="3"
                      placeholder="Descreva o problema com o maior detalhe possível..."
                      required
                      #defDesc="ngModel"></textarea>
            <div *ngIf="defDesc.touched && countWords(newRequest.defectDescription) < 3"
                 class="text-danger small mt-1">
              Explique com mais detalhes (mínimo 3 palavras).
            </div>
          </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button"
                  class="btn btn-outline-secondary px-4"
                  (click)="onCancel()">
            Cancelar
          </button>
          <button type="submit"
                  class="btn btn-primary px-4"
                  [disabled]="requestForm.invalid ||
                              countWords(newRequest.equipmentDescription) < 3 ||
                              countWords(newRequest.defectDescription) < 3">
            <i class="bi bi-send me-1"></i> Enviar Solicitação
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
