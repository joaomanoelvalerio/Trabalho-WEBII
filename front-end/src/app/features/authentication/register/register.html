<div class="register-container">
  <div class="card shadow-sm p-4">

    <h1 class="text-center mb-1">Crie sua Conta</h1>

    <div class="steps-indicator mb-4">
      <div class="step" [class.active]="currentStep === 1" [class.done]="currentStep === 2">
        <span class="step-number">1</span>
        <span class="step-label">Dados Pessoais</span>
      </div>
      <div class="step-line"></div>
      <div class="step" [class.active]="currentStep === 2">
        <span class="step-number">2</span>
        <span class="step-label">Endereço</span>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div *ngIf="currentStep === 1">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Nome Completo:</label>
            <input type="text" class="form-control" name="name" [(ngModel)]="user.name" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">E-mail:</label>
            <input type="email" class="form-control" name="email" [(ngModel)]="user.email" required email />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">CPF:</label>
            <input type="text" class="form-control" name="cpf" [(ngModel)]="user.cpf" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Telefone:</label>
            <input type="tel" class="form-control" name="phone" [(ngModel)]="user.phone" required />
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <button type="button" class="btn btn-outline-secondary" (click)="navigateToLogin()">
            Já possui uma conta?
          </button>
          <button type="button" class="btn btn-primary px-4"
            [disabled]="!user.name || !user.email || !user.cpf || !user.phone"
            (click)="nextStep()">
            Próximo
          </button>
        </div>
      </div>

      <div *ngIf="currentStep === 2">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">CEP:</label>
            <div class="input-group">
              <input type="text" class="form-control" name="zipCode"
                [(ngModel)]="user.address.zipCode"
                (blur)="onZipCodeBlur()"
                (input)="formatZipCode($event)"
                maxlength="9"
                placeholder="00000-000"
                required />
              <span class="input-group-text" *ngIf="isAddressLoading">
                <span class="spinner-border spinner-border-sm"></span>
              </span>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Rua/Logradouro:</label>
            <input type="text" class="form-control" name="street"
                   [(ngModel)]="user.address.street"
                   [readonly]="user.address.street !== ''" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Número:</label>
            <input type="text" class="form-control" name="number"
                   [(ngModel)]="user.address.number" required />
          </div>
          <div class="col-md-8 mb-3">
            <label class="form-label fw-bold">Complemento (Opcional):</label>
            <input type="text" class="form-control" name="complement"
                   [(ngModel)]="user.address.complement" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Bairro:</label>
            <input type="text" class="form-control" name="neighborhood"
                   [(ngModel)]="user.address.neighborhood"
                   [readonly]="user.address.neighborhood !== ''" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Cidade:</label>
            <input type="text" class="form-control" name="city"
                   [(ngModel)]="user.address.city"
                   [readonly]="user.address.city !== ''" required />
          </div>
          <div class="col-md-2 mb-3">
            <label class="form-label fw-bold">Estado:</label>
            <input type="text" class="form-control" name="state"
                   [(ngModel)]="user.address.state"
                   [readonly]="user.address.state !== ''" required />
          </div>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

        <div class="d-flex justify-content-between mt-4">
          <button type="button" class="btn btn-outline-secondary" (click)="prevStep()">
            Voltar
          </button>
          <button type="submit" class="btn btn-primary px-4"
                  [disabled]="registerForm.invalid || isAddressLoading">
            Cadastrar
          </button>
        </div>
      </div>

    </form>
  </div>
</div>
