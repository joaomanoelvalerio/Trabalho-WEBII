<div class="login-container">
    <h1>Login</h1>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div id="texto">
            <div class='camposLogin'>
                <label for="inputEmail">Email:</label>
                <input
                    type="email"
                    name="email"
                    [(ngModel)]="credentials.email"
                    id="inputEmail"
                    required>

                <label for="inputPassword">Senha:</label>
                <input
                    type="password"
                    name="password"
                    [(ngModel)]="credentials.password"
                    id="inputPassword"
                    required>
            </div>
        </div>

        <div *ngIf="errorMessage" class="error-alert">
            {{ errorMessage }}
        </div>

        <div class="Botoes">
            <button type="submit" id="Botao" [disabled]="loginForm.invalid">Entrar</button>
            <button (click)="navigateToRegister()" type="button" id="BotaoSecundario">
                Cadastrar
            </button>
        </div>
    </form>
</div>
