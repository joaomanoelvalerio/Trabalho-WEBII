<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">Manutenção de Equipamentos</a>

    @if (authService.getLoggedInUser(); as user) {
      <div class="d-flex align-items-center flex-wrap gap-2">
        <span class="text-white me-2">Olá, {{ user.name }}</span>

        @if (user.role === 'CLIENT') {
          <a class="btn btn-sm btn-light me-1" routerLink="/client">
            Minhas Solicitações
          </a>
        }

        @if (user.role === 'EMPLOYEE' || user.role === 'ADMIN') {
          <a class="btn btn-sm btn-light me-1" routerLink="/employee">
            Solicitações Abertas
          </a>
          <a class="btn btn-sm btn-light me-1" routerLink="/employee/solicitations">
            Todas Solicitações
          </a>
          <a class="btn btn-sm btn-light me-1" routerLink="/employee/categories">
            Categorias
          </a>
          <a class="btn btn-sm btn-light me-1" routerLink="/employee/employees">
            Funcionários
          </a>
          <a class="btn btn-sm btn-light me-1" routerLink="/employee/reports">
            Relatórios
          </a>
        }

        <button class="btn btn-sm btn-outline-light" (click)="logout()">Sair</button>
      </div>
    }
  </div>
</nav>
